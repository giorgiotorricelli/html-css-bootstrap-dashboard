<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="img/duck.png">
    <link rel="stylesheet" href="css/add_book.css">
</head>

<body>
    <header>
        <nav class="navbar fixed-top navbar-expand-lg bg-dark border-bottom border-body" data-bs-theme="dark">
            <div class="container-fluid">
                <div class="logo-header">
                    <img src="img/duck.png" alt="logo">
                </div>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="index.html">Catalogo Libri</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Anagrafica Utenti</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Storico Prestiti</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Help</a>
                        </li>
                    </ul>
                    <form class="d-flex" role="search">
                        <input class="form-control me-2 bg-white text-dark custom-placeholder" type="search"
                            placeholder="Cerca..." aria-label="Search" />
                        <button class="btn btn-outline-light" type="submit">Cerca</button>
                    </form>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <div class="container my-margin-top pb-5">
            <h1 class="fs-4"> Nuovo Libro </h1>
            <div class="row">
                <div class="col-6 mb-3">
                    <span class="fw-medium d-inline-block mb-2">Nome autore</span>
                    <input type="text" class="form-control custom-placeholder"
                        placeholder="Inserisci il nome dell'autore" aria-label="Sizing example input"
                        aria-describedby="inputGroup-sizing-sm">
                </div>
                <div class="col-6 mb-3">
                    <span class="fw-medium d-inline-block mb-2">Cognome autore</span>
                    <input type="text" class="form-control custom-placeholder"
                        placeholder="Inserisci il cognome dell'autore" aria-label="Sizing example input"
                        aria-describedby="inputGroup-sizing-sm">
                </div>
            </div>
            <div class="row">
                <div class="col-12 mb-3">
                    <span class="fw-medium d-inline-block mb-2">Titolo</span>
                    <input type="text" class="form-control custom-placeholder"
                        placeholder="Inserisci il titolo del libro" aria-label="Sizing example input"
                        aria-describedby="inputGroup-sizing-sm">
                    <span class="d-inline-block mb-2 mt-1 fw-medium text-body-tertiary">Titolo versione italiana</span>
                </div>
            </div>
            <div class="gen-year-isbn row mb-4">
                <div class="col-lg-4 mb-3">
                    <span class="fw-medium d-inline-block mb-2">Genere</span>
                    <div class="accordion" id="accordionExample">
                        <div class="accordion-item">
                            <h2 class="accordion-header">
                                <button class="accordion-button fw-medium" type="button" data-bs-toggle="collapse"
                                    data-bs-target="#collapseOne" aria-expanded="true" aria-controls="collapseOne">
                                    Scegli il genere
                                </button>
                            </h2>
                            <div id="collapseOne" class="accordion-collapse collapse"
                                data-bs-parent="#accordionExample">
                                <div class="accordion-body">
                                    <div class="list-group">
                                        <a href="#" class="list-group-item list-group-item-action"
                                            aria-current="true">Biografico</a>
                                        <a href="#" class="list-group-item list-group-item-action">Giallo</a>
                                        <a href="#" class="list-group-item list-group-item-action">Romanzo di
                                            formazione</a>
                                        <a href="#" class="list-group-item list-group-item-action">Fantasy</a>
                                        <a href="#" class="list-group-item list-group-item-action disabled"
                                            aria-disabled="true">Drammatico</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-4 mb-3">
                    <span class="fw-medium d-inline-block mb-2">Anno di pubblicazione</span>
                    <input type="text" class="form-control custom-placeholder" placeholder="Inserisci l'anno"
                        aria-label="Sizing example input" aria-describedby="inputGroup-sizing-sm">
                </div>
                <div class="col-lg-4 mb-3">
                    <span class="fw-medium d-inline-block mb-2">ISBN#</span>
                    <input type="text" class="form-control custom-placeholder" placeholder="Inserisci il codice ISBN#"
                        aria-label="Sizing example input" aria-describedby="inputGroup-sizing-sm">
                </div>
            </div>
            <div class="my-container">
                <div class="row">
                    <div class="col-12 barra"></div>
                </div>
            </div>
            <div class="row">
                <div class="col-12 mb-3">
                    <span class="fw-medium d-inline-block mb-2">Note</span>
                    <div class="input-group">
                        <textarea class="form-control custom-placeholder"
                            placeholder="Inserisci eventuali note sul libro" aria-label="With textarea"></textarea>
                    </div>
                </div>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" value="" id="checkDefault">
                <label class="form-check-label" for="checkDefault">
                    Disponibile anche in digitale
                </label>
            </div>
            <a class="btn btn-primary mt-3" href="index.html">Aggiungi Libro</a>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
